<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule App</title>
<style>
body{
  margin:0;
  font-family:-apple-system,sans-serif;
  background:#f7f5f2;
}

.header{
  text-align:center;
  padding:15px;
  font-size:20px;
}

.month-bar{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

button{
  border:none;
  padding:6px 10px;
  border-radius:999px;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  cursor:pointer;
}

.filter{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  padding:10px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  padding:10px;
}

.day{
  background:#fff;
  min-height:80px;
  border-radius:12px;
  padding:5px;
  cursor:pointer;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  display:inline-block;
  margin:1px;
}

/* モーダル */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-box{
  background:#fff;
  padding:15px;
  border-radius:14px;
  width:85%;
  position:relative;
  z-index:10000;
}
.modal *{
  pointer-events:auto
}

.event{
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid #eee;
}

.del{
  color:red;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="header">Schedule</div>
<div class="month-bar">
<button onclick="changeMonth(-1)">←</button>
<div id="monthLabel"></div>
<button onclick="changeMonth(1)">→</button>
</div>
<div class="filter" id="filter"></div>
<div class="calendar" id="calendar"></div>
<div class="modal" id="modal">
<div class="modal-box">
<div id="selectedDate"></div>
<div id="events"></div>
</div>
</div>
<script>
const members = {
 "Shori":"#ff9aa2",
 "Fuma":"#cdb4ff",
 "So":"#a8e6a3",
 "Takuto":"#9fdfff",
 "Haruka":"#bff7a1",
 "Masaki":"#ffb3d6",
 "Shuto":"#ffe38a",
 "Shino":"#e0e0e0"
};

let schedules = JSON.parse(localStorage.getItem("schedule") || "{}");
let current = new Date();
let selectedDate = "";

function save(){
 localStorage.setItem("schedule",JSON.stringify(schedules));
}

function render(){
 let cal = document.getElementById("calendar");
 cal.innerHTML="";

 let y=current.getFullYear();
 let m=current.getMonth();

 document.getElementById("monthLabel").innerText=`${y}/${m+1}`;

 let first=new Date(y,m,1).getDay();
 let last=new Date(y,m+1,0).getDate();

 for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

 for(let d=1; d<=last; d++){

 let key=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
 let events=schedules[key]||[];

 let dots="";
 events.forEach(e=>{
 dots+=`<span class="dot" style="background:${members[e.member]}"></span>`;
 });

 cal.innerHTML+=`
 <div class="day" onclick="openModal('${key}')">
 <div>${d}</div>
 <div>${dots}</div>
 </div>`;
 }
}

function openModal(date){
 selectedDate=date;
 document.getElementById("selectedDate").innerText=date;

 let html="";
 let events=schedules[date]||[];

 events.forEach((e,i)=>{
 html+=`
 <div class="event">
 ${e.member} - ${e.title}
 <span class="del" onclick="del(${i})">削除</span>
 </div>
 `;
 });

 document.getElementById("events").innerHTML=html;

 let sel=document.getElementById("member");
 sel.innerHTML="";
 for(let m in members){
 sel.innerHTML+=`<option value="${m}">${m}</option>`;
 }

 document.getElementById("modal").style.display="flex";
}

function addEvent(){
 let m=document.getElementById("member").value;
 let t=document.getElementById("title").value;

 if(!schedules[selectedDate]) schedules[selectedDate]=[];

 schedules[selectedDate].push({member:m,title:t});
 save();
 render();
 openModal(selectedDate);
}

function del(i){
 schedules[selectedDate].splice(i,1);
 save();
 render();
 openModal(selectedDate);
}

render();
</script>
</body>
</html>
