<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
THIS_IS_TEST_999
<title>Schedule</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
.header{text-align:center;padding:10px;font-size:20px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:10px}
.day{background:#fff;padding:10px;min-height:60px;border-radius:8px;cursor:pointer}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center}
.modal-box{background:#fff;padding:15px;border-radius:10px;width:80%}
</style>
</head>

<body>

<div class="header">Schedule</div>

<div class="calendar" id="calendar"></div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div id="date"></div>
    <select id="member">
      <option>Shori</option>
      <option>Fuma</option>
      <option>So</option>
    </select>
    <input id="title" placeholder="予定">
    <button onclick="add()">追加</button>
  </div>
</div>

<script>
let selected="";
let data={};

function render(){
 let cal=document.getElementById("calendar");
 for(let i=1;i<=30;i++){
  cal.innerHTML+=`<div class="day" onclick="openM(${i})">${i}</div>`;
 }
}

function openM(d){
 selected=d;
 document.getElementById("date").innerText=d;
 document.getElementById("modal").style.display="flex";
}

function add(){
 let m=document.getElementById("member").value;
 let t=document.getElementById("title").value;
 if(!data[selected]) data[selected]=[];
 data[selected].push(m+" "+t);
 alert("追加した");
 document.getElementById("modal").style.display="none";
}

render();
</script>

</body>
</html>
