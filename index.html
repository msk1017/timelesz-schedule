<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule App</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#f7f5f2,#ffffff);
  color:#333;
}
/* ヘッダー */
.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:300;
}
/* 月ナビ */
.month-bar{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin-bottom:10px;
}
.month-bar button{
  border:none;
  background:#fff;
  padding:6px 12px;
  border-radius:999px;
  box-shadow:0 3px 10px rgba(0,0,0,.1);
  cursor:pointer;
}
/* フィルター */
.filter{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  padding:10px;
}
.filter button{
  border:none;
  padding:6px 10px;
  border-radius:999px;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  cursor:pointer;
  font-size:12px;
}
/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  padding:10px;
}
.day{
  background:#fff;
  min-height:80px;
  border-radius:14px;
  padding:5px;
  font-size:12px;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}
.today{
  outline:2px solid #ffccaa;
}
/* ドット */
.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  display:inline-block;
  margin:1px;
}
/* モーダル */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  justify-content:center;
  align-items:center;
}
.modal-box{
  background:#fff;
  padding:15px;
  border-radius:14px;
  width:85%;
}
input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}
button.save{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#333;
  color:#fff;
}
</style>
</head>
<body>
<div class="header">Schedule</div>
<div class="month-bar">
  <button onclick="changeMonth(-1)">←</button>
  <div id="monthLabel"></div>
  <button onclick="changeMonth(1)">→</button>
</div>
<div class="filter" id="filter"></div>
<div class="calendar" id="calendar"></div>
<div class="modal" id="modal">
  <div class="modal-box">
    <div id="selectedDate"></div>
    <select id="member"></select>
    <input id="title" placeholder="予定を入力">
    <button class="save" onclick="addEvent()">追加</button>
  </div>
</div>
<script>
const members = {
 "Shori":"#ff9aa2",
 "Fuma":"#cdb4ff",
 "So":"#a8e6a3",
 "Takuto":"#9fdfff",
 "Haruka":"#bff7a1",
 "Masaki":"#ffb3d6",
 "Shuto":"#ffe38a",
 "Shino":"#e0e0e0"
};
let schedules = JSON.parse(localStorage.getItem("schedule") || "{}");
let filter = "all";
let selectedDate = "";
let current = new Date();
function save(){
 localStorage.setItem("schedule",JSON.stringify(schedules));
}
function setFilter(m){
 filter = m;
 render();
}
function buildFilter(){
 let html = `<button onclick="setFilter('all')">ALL</button>`;
 for(let m in members){
  html += `<button onclick="setFilter('${m}')">${m}</button>`;
 }
 document.getElementById("filter").innerHTML = html;
}
function changeMonth(n){
 current.setMonth(current.getMonth()+n);
 render();
}
function render(){
let cal = document.getElementById("calendar");
cal.innerHTML="";
let y = current.getFullYear();
let m = current.getMonth();
document.getElementById("monthLabel").innerText = `${y} / ${m+1}`;
let first = new Date(y,m,1).getDay();
let last = new Date(y,m+1,0).getDate();
for(let i=0;i<first;i++) cal.innerHTML += `<div></div>`;
for(let d=1; d<=last; d++){
let key = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
let events = schedules[key] || [];
if(filter!="all"){
 events = events.filter(e=>e.member==filter);
}
let dots="";
events.forEach(e=>{
 dots += `<span class="dot" style="background:${members[e.member]}"></span>`;
});
cal.innerHTML += `
<div class="day" onclick="openModal('${key}')">
<div>${d}</div>
<div>${dots}</div>
</div>`;
}
}
function openModal(date){
 selectedDate = date;
 document.getElementById("selectedDate").innerText = date;
 let sel = document.getElementById("member");
 sel.innerHTML = "";
 for(let m in members){
  sel.innerHTML += `<option value="${m}">${m}</option>`;
 }
 document.getElementById("modal").style.display="flex";
}
function addEvent(){
 let m = document.getElementById("member").value;
 let t = document.getElementById("title").value;
 if(!schedules[selectedDate]) schedules[selectedDate]=[];
 schedules[selectedDate].push({member:m,title:t});
 save();
 render();
 document.getElementById("modal").style.display="none";
}
buildFilter();
render();
</script>
</body>
</html>
