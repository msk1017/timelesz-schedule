<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#fdfcfb,#f7f2ee);
  color:#333;
}
/* ヘッダー */
.header{
  text-align:center;
  font-size:22px;
  font-weight:300;
  padding:18px;
  letter-spacing:1px;
}
/* フィルター */
.filter{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  padding:10px;
}
.filter button{
  border:none;
  padding:6px 12px;
  border-radius:999px;
  background:#fff;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
  cursor:pointer;
  font-size:12px;
  transition:.2s;
}
.filter button:hover{
  transform:scale(1.05);
}
/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  padding:10px;
}
.day{
  background:#fff;
  border-radius:16px;
  min-height:85px;
  padding:6px;
  box-shadow:0 5px 15px rgba(0,0,0,.06);
  cursor:pointer;
  transition:.2s;
  position:relative;
}
.day:hover{
  transform:translateY(-3px);
}
.date{
  font-size:13px;
  font-weight:600;
}
/* ドット */
.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  display:inline-block;
  margin:1px;
}
/* モーダル */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  justify-content:center;
  align-items:center;
}
.modal-box{
  background:#fff;
  width:85%;
  border-radius:16px;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}
input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}
button.save{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#333,#666);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="header">Schedule</div>
<div class="filter" id="filter"></div>
<div class="calendar" id="calendar"></div>
<!-- モーダル -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div id="selectedDate"></div>
    <select id="member"></select>
    <input id="title" placeholder="予定を入力">
    <button class="save" onclick="addEvent()">追加</button>
  </div>
</div>
<script>
const members = {
 "Shori":"#ff9aa2",
 "Fuma":"#cdb4ff",
 "So":"#a8e6a3",
 "Takuto":"#9fdfff",
 "Haruka":"#bff7a1",
 "Masaki":"#ffb3d6",
 "Shuto":"#ffe38a",
 "Shino":"#e0e0e0"
};
let schedules = JSON.parse(localStorage.getItem("schedule") || "{}");
let filter = "all";
let selectedDate = "";
function save(){
 localStorage.setItem("schedule",JSON.stringify(schedules));
}
function setFilter(m){
 filter = m;
 render();
}
function buildFilter(){
 let html = `<button onclick="setFilter('all')">ALL</button>`;
 for(let m in members){
  html += `<button onclick="setFilter('${m}')">${m}</button>`;
 }
 document.getElementById("filter").innerHTML = html;
}
function render(){
 let cal = document.getElementById("calendar");
 cal.innerHTML="";
 let now = new Date();
 let y = now.getFullYear();
 let m = now.getMonth();
 let first = new Date(y,m,1).getDay();
 let last = new Date(y,m+1,0).getDate();
 for(let i=0;i<first;i++) cal.innerHTML += `<div></div>`;
 for(let d=1; d<=last; d++){
 let key = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
 let events = schedules[key] || [];
 if(filter!="all"){
  events = events.filter(e=>e.member==filter);
 }
 let dots="";
 events.forEach(e=>{
  dots += `<span class="dot" style="background:${members[e.member]}"></span>`;
 });
 cal.innerHTML += `
 <div class="day" onclick="openModal('${key}')">
 <div class="date">${d}</div>
 <div>${dots}</div>
 </div>`;
 }
}
function openModal(date){
 selectedDate = date;
 document.getElementById("selectedDate").innerText = date;
 let sel = document.getElementById("member");
 sel.innerHTML = "";
 for(let m in members){
  sel.innerHTML += `<option value="${m}">${m}</option>`;
 }
 document.getElementById("modal").style.display="flex";
}
function addEvent(){
 let m = document.getElementById("member").value;
 let t = document.getElementById("title").value;
 if(!schedules[selectedDate]) schedules[selectedDate]=[];
 schedules[selectedDate].push({member:m,title:t});
 save();
 render();
 closeModal();
}
function closeModal(){
 document.getElementById("modal").style.display="none";
}
buildFilter();
render();
</script>
</body>
</html>
